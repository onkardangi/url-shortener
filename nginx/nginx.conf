worker_processes auto;

events {
    # How many simultaneous connections one Nginx worker can handle.
    # 1024 is a sensible default for a learning setup.
    worker_connections 4096;
}

http {
    # Define the pool of upstream app instances.
    # "app" matches the service name in docker-compose.yml.
    # Docker's internal DNS resolves "app" to ALL running instances
    # of that service automatically — no hardcoding IPs.
    upstream shortener_app {
        server app:8080;

        # Round-robin is the default — each request goes to the
        # next instance in rotation. Simple and effective for
        # stateless apps like ours.
        #
        # Other strategies you can explore later:
        #   least_conn  — send to instance with fewest active connections
        #   ip_hash     — same client always hits same instance (for sessions)
        #                 we don't need this because we're stateless
    }

    server {
        listen 80;

        # Tune timeouts to match Spring Boot's behavior
        proxy_connect_timeout       10s;
        proxy_send_timeout          60s;
        proxy_read_timeout          60s;

        # Pass the real client IP to the app
        # (useful for rate limiting per-IP later)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        # Don't pass the Nginx version in error pages
        server_tokens off;

        location / {
            proxy_pass http://shortener_app;

            # Critical: disable proxy buffering for redirects.
            # Without this, Nginx buffers the 301 response before
            # forwarding — adds latency for zero benefit since
            # our responses are tiny.
            proxy_buffering off;
        }
    }
}