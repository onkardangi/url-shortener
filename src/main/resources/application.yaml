spring:
  application:
    name: url-shortener

  datasource:
    # These env vars come from docker-compose. Fallbacks let you run locally too.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shortener}
    username: ${DB_USER:shortener}
    password: ${DB_PASSWORD:shortener}
    hikari:
      maximum-pool-size: 20       # max connections per instance
      minimum-idle: 5              # keep 5 warm connections ready
      connection-timeout: 20000    # 20s — wait for a connection before erroring
      idle-timeout: 300000         # 5min — close idle connections
      max-lifetime: 1200000        # 20min — recycle connections (prevents stale)
      pool-name: ShortenerPool

  jpa:
    open-in-view: false
    # ddl-auto=validate means Hibernate checks the schema matches entities but
    # never modifies it. Flyway owns the schema. This is the professional default.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # Logs SQL with bound params during dev. Turn off in prod.
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shortener}
    user: ${DB_USER:shortener}
    password: ${DB_PASSWORD:shortener}

  # ─── Redis ───────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2s
      timeout: 1s

  # ─── Cache ───────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 3600000   # 1 hour in milliseconds
      cache-null-values: false # don't cache misses


server:
  port: 8080

# What the redirect host should be. Configurable so prod can use a real domain.
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  datasource:
    replica-url: ${DB_REPLICA_URL:${DB_URL:jdbc:postgresql://localhost:5432/shortener}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true   # brackets required — dots would be parsed as nested keys