global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'url-shortener'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'app:8080'
        labels:
          env: local

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']